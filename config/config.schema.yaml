description: "Grove Developer Interface Configuration YAML: this file is used to configure the Grove Developer Interface."
type: object
required:
  - llm_config
additionalProperties: false
properties:
  git_config:
    description: "Git configuration."
    type: object
    required:
      - personal_access_token
    additionalProperties: false
    properties:
      personal_access_token:
        description: "Valid Personal Access Token for GitHub. Required if performing actions on a private repository. Should have at least `write` scope for `repo`."
        type: string
        pattern: "^(ghp_|gho_|ghu_|ghs_|ghr_|github_pat_)[a-zA-Z0-9_]{36,}$"
  llm_config:
    description: "LLM configuration."
    type: object
    required:
      - default_llm_provider
      - llm_providers
    additionalProperties: false
    properties:
      default_llm_provider:
        description: "The default LLM provider to use."
        type: string
        enum:
          - "openai"
          - "deepseek"
          - "anthropic"
      llm_providers:
        description: "LLM providers configuration."
        type: object
        anyOf:
          - required: ["openai"]
          - required: ["deepseek"]
          - required: ["anthropic"]
        additionalProperties: false
        properties:
          openai:
            description: "OpenAI configuration."
            type: object
            required:
              - api_key
              - client_model
            additionalProperties: false
            properties:
              api_key:
                description: "API key for OpenAI."
                type: string
              client_model:
                description: "Client model for OpenAI."
                type: string
                enum:
                  - "o1-mini"
                  - "o1"
                  - "o3-mini"
                  - "gpt-4o"
          deepseek:
            description: "DeepSeek configuration."
            type: object
            required:
              - api_key
              - client_model
            additionalProperties: false
            properties:
              api_key:
                description: "API key for DeepSeek."
                type: string
              client_model:
                description: "Client model for DeepSeek."
                type: string
                enum:
                  - "deepseek-chat"
                  - "deepseek-coder"
                  - "deepseek-reasoner"
          anthropic:
            description: "Anthropic configuration."
            type: object
            required:
              - api_key
              - client_model
            additionalProperties: false
            properties:
              api_key:
                description: "API key for Anthropic."
                type: string
              client_model:
                description: "Client model for Anthropic."
                type: string
                enum:
                  - "claude-3-5-haiku-latest"
                  - "claude-3-5-sonnet-latest"
                  - "claude-3-opus-20240229"


